<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EvenOut — owner stats</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.9rem; margin-bottom: 1.1rem; }
    .stat { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 1rem 1.1rem; }
    .stat .num { font-family: var(--font); font-size: 2rem; color: var(--teal); }
    .stat .lbl { font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: #6b8a85; }
    .spark { width: 100%; height: 90px; }
    .spark polyline { fill: none; stroke: var(--marigold); stroke-width: 2.5; }
    .spark .area { fill: #d9770622; stroke: none; }
  </style>
</head>
<body>
  <header class="top">
    <a class="brand" href="./">EvenOut</a>
    <span class="tag">owner dashboard</span>
  </header>
  <main id="main">
    <section class="panel"><p class="loading">Checking access…</p></section>
  </main>
  <footer class="foot">
    <span><a href="./">← back to EvenOut</a></span>
    <span><a href="https://github.com/Shubham-Safaya/evenout">Source</a></span>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    (async () => {
      const cfg = window.EVENOUT_CONFIG || window.HISAAB_CONFIG;
      const db = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
      const main = document.getElementById("main");

      const signInView = () => {
        main.innerHTML = `<section class="panel"><h2>Owner sign-in required</h2>
          <p>These metrics are private. Sign in with the owner email to view them.</p>
          <button class="btn" id="si">Sign in with email</button></section>`;
        document.getElementById("si").onclick = async () => {
          const email = prompt("Owner email:");
          if (!email) return;
          const { error } = await db.auth.signInWithOtp({
            email: email.trim(),
            options: { emailRedirectTo: location.origin + location.pathname },
          });
          alert(error ? error.message : "Check your email for the login link.");
        };
      };

      const { data: { session } } = await db.auth.getSession();
      if (!session) return signInView();

      const { data: s, error } = await db.rpc("get_stats");
      if (error) {
        main.innerHTML = `<section class="panel"><h2>Not authorized</h2>
          <p>${session.user.email} is not an admin (or migration 004 hasn't been run).</p>
          <button class="linkish" id="so" style="color:var(--teal)">sign out</button></section>`;
        document.getElementById("so").onclick = async () => { await db.auth.signOut(); location.reload(); };
        return;
      }

      const card = (n, l) => `<div class="stat"><div class="num">${n}</div><div class="lbl">${l}</div></div>`;
      const days = s.daily || [];
      const max = Math.max(1, ...days.map(d => d.actives));
      const pts = days.map((d, i) => `${(i / Math.max(1, days.length - 1)) * 300},${88 - (d.actives / max) * 80}`);
      main.innerHTML = `
        <section class="hero"><h1>EvenOut metrics</h1>
          <p>Signed in as ${session.user.email}. Aggregates of anonymous device
          tokens — this is all the data that exists.</p></section>
        <div class="stats-grid">
          ${card(s.dau, "active today (DAU)")}
          ${card(s.mau, "active 30 days (MAU)")}
          ${card(s.installs, "app installs")}
          ${card(s.total_groups, "groups")}
          ${card(s.total_expenses, "expenses tracked")}
          ${card(s.total_settlements, "settle-ups")}
        </div>
        <section class="panel">
          <h2>Daily active devices — last 30 days</h2>
          <svg class="spark" viewBox="0 0 300 90" preserveAspectRatio="none">
            <polygon class="area" points="0,90 ${pts.join(" ")} 300,90"></polygon>
            <polyline points="${pts.join(" ")}"></polyline>
          </svg>
          <p class="hint">Peak: ${max}/day · ${days.reduce((a, d) => a + d.actives, 0)} device-days in 30 days
            · <button class="linkish" id="so" style="color:var(--teal)">sign out</button></p>
        </section>`;
      document.getElementById("so").onclick = async () => { await db.auth.signOut(); location.reload(); };
    })();
  </script>
</body>
</html>
